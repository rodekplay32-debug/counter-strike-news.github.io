<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Server</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#5865F2,#404EED,#202225,#5865F2);
background-size:400% 400%;
animation:bg 10s ease infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:400px;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.2);
box-shadow:0 0 40px rgba(0,0,0,.4);
text-align:center;
color:white;
animation:show .8s ease;
}

@keyframes show{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo img{
width:200px;
height:200px;
border-radius:50%;
object-fit:cover;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-10px);
}
}

h1{
margin-top:10px;
font-size:32px;
}

.status{
margin-top:8px;
color:#57F287;
font-weight:bold;
}

.stats{
display:flex;
justify-content:space-around;
margin:35px 0;
}

.box{
padding:15px;
border-radius:15px;
background:rgba(255,255,255,.07);
width:120px;
transition:.3s;
}

.box:hover{
transform:scale(1.1);
background:rgba(255,255,255,.12);
}

.number{
font-size:30px;
font-weight:bold;
}

.text{
opacity:.8;
}

.join{
display:inline-block;
padding:15px 35px;
border-radius:15px;
background:#5865F2;
color:white;
text-decoration:none;
font-weight:bold;
transition:.3s;
box-shadow:0 0 25px rgba(88,101,242,.5);
}

.join:hover{
transform:translateY(-4px);
background:#7289DA;
box-shadow:0 0 35px rgba(88,101,242,.9);
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.05);
animation:move 20s linear infinite;
}

.circle:nth-child(1){
width:200px;
height:200px;
top:-50px;
left:-50px;
}

.circle:nth-child(2){
width:300px;
height:300px;
bottom:-120px;
right:-120px;
}

@keyframes move{
0%{
transform:rotate(0deg) translateY(0);
}
100%{
transform:rotate(360deg) translateY(20px);
}
}

</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>

<div class="card">

<div class="logo"><img src="https://ltdfoto.ru/images/2026/06/25/Desktop-Screenshot-2026.06.25---00.51.14.92.png" alt="Desktop-Screenshot-2026.06.25---00.51.14.92.png" border="0" /></div>

<h1>Counter-Strike News</h1>

<div class="status">
🟢 Онлайн
</div>

<div class="stats">

<div class="box">
<div class="number" id="members">65</div>
<div class="text">Участников</div>
</div>

<div class="box">
<div class="number" id="boosts">4</div>
<div class="text">Бустов</div>
</div>

</div>

<a class="join" href="https://discord.gg/scjJsptku8" target="_blank">
Присоединиться
</a>

</div>

<script>

// Для демонстрации небольшая анимация счётчиков

function animate(id,target){
let n=0;
let el=document.getElementById(id);

let timer=setInterval(()=>{
n+=Math.ceil(target/60);

if(n>=target){
n=target;
clearInterval(timer);
}

el.innerHTML=n;

},20);

}

animate("members",65);
animate("boosts",4);

</script>

</body>
</html>
